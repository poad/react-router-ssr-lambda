name: Deploy

on:
  pull_request:
    branches:
      - main
  push:
    branches:
    - main

  workflow_dispatch:

env:
  OIDC_IAM_ROLE_ARN: ${{ secrets.OIDC_IAM_ROLE_ARN }}
  AWS_REGION: us-west-2

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
      with:
        role-to-assume: ${{ env.OIDC_IAM_ROLE_ARN }}
        role-session-name: GitHubActions
        aws-region: ${{ env.AWS_REGION }}

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Use Node.js 22.x
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 22.x
        check-latest: true
        package-manager-cache: false

    - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
      name: Install pnpm
      id: pnpm-install
      with:
        run_install: |
          - recursive: true
            args: [--no-frozen-lockfile]
          - args: [--global, aws-cdk]

    - name: deploy (cdk)
      working-directory: cdk
      env:
        CI: 1
      run: 
        cdk deploy

    - name: Get URL
      id: get-url
      uses: ./.github/actions/get-stack-output
      with:
        stack-name: react-router-ssr-lambda-stack
        output-key: Output

    - name: Verify HTTP Status
      env:
        URL: ${{ steps.get-url.outputs.output-value }}
      run: |
        CODE=$(curl -w "%{http_code}\n" -o /dev/null -sSL "$URL")
        if [ "$CODE" != "200" ]; then exit 1; fi
